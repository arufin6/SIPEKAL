<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIPEKAL - Sistem Informasi Pelayanan Kapal</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-50 text-slate-800 font-sans">

    <header class="bg-blue-950 text-white shadow-md sticky top-0 z-50 border-b border-blue-900">
        <div class="container mx-auto px-4 py-4 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <i class="fa-solid fa-ship text-3xl text-blue-400"></i>
                <div>
                    <h1 class="text-2xl font-black tracking-wider text-white">SIPEKAL</h1>
                    <p class="text-xs text-blue-300 font-medium uppercase tracking-widest">Sistem Informasi Pelayanan Kapal Terintegrasi</p>
                </div>
            </div>
            <div class="flex items-center gap-2 bg-blue-900/50 px-3 py-1.5 rounded-full border border-blue-700/50">
                <span class="w-2 h-2 rounded-full bg-emerald-400 animate-pulse"></span>
                <span class="text-xs font-semibold text-emerald-300 tracking-wide">Server Online</span>
            </div>
        </div>
    </header>

    <main class="container mx-auto px-4 py-8 max-w-7xl space-y-6">
        
        <div class="bg-white p-2.5 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row gap-2">
            <button onclick="switchRole('agen')" id="tab-agen" class="role-tab flex-1 bg-blue-900 text-white font-bold text-sm px-5 py-3 rounded-lg transition-all flex items-center justify-center gap-2.5 shadow-sm">
                <i class="fa-solid fa-user-tie text-base"></i> Portal Agen Kapal (Input PKK)
            </button>
            <button onclick="switchRole('petugas')" id="tab-petugas" class="role-tab flex-1 bg-slate-100 hover:bg-slate-200 text-slate-700 font-bold text-sm px-5 py-3 rounded-lg transition-all flex items-center justify-center gap-2.5">
                <i class="fa-solid fa-building-shield text-base"></i> Dasbor Verifikator (Otoritas &amp; Syahbandar)
            </button>
            <button onclick="switchRole('manajemen')" id="tab-manajemen" class="role-tab flex-1 bg-slate-100 hover:bg-slate-200 text-slate-700 font-bold text-sm px-5 py-3 rounded-lg transition-all flex items-center justify-center gap-2.5">
                <i class="fa-solid fa-chart-pie text-base"></i> Dasbor Eksekutif (Statistik BOR &amp; Revenue)
            </button>
        </div>

        <section id="role-content-agen" class="role-panel bg-white p-6 md:p-8 rounded-xl shadow-sm border border-slate-200 space-y-6">
            <div class="flex items-center gap-3 border-b border-slate-100 pb-3">
                <div class="p-2 bg-blue-100 text-blue-900 rounded-lg">
                    <i class="fa-solid fa-file-circle-plus text-xl"></i>
                </div>
                <div>
                    <h3 class="text-lg font-bold text-slate-900">Pemberitahuan Kedatangan Kapal (PKK)</h3>
                    <p class="text-xs text-slate-500">Silakan lengkapi data teknis dan manifes kapal untuk pengajuan izin sandar.</p>
                </div>
            </div>
            
            <form id="form-pkk" onsubmit="submitFormPKK(event)" class="grid grid-cols-1 md:grid-cols-2 gap-5">
                <div>
                    <label class="block text-xs font-bold uppercase tracking-wider text-slate-600 mb-1.5">Nama Kapal (Vessel Name)</label>
                    <input type="text" id="ship-name" required placeholder="Contoh: MV. COSCO SURABAYA" class="w-full p-2.5 border border-slate-300 rounded-lg text-sm bg-slate-50 focus:bg-white focus:ring-2 focus:ring-blue-900 focus:border-blue-900 outline-none transition-all">
                </div>
                <div>
                    <label class="block text-xs font-bold uppercase tracking-wider text-slate-600 mb-1.5">Ukuran Kapal (Gross Tonnage / GT)</label>
                    <input type="number" id="ship-gt" required placeholder="Contoh: 25000" class="w-full p-2.5 border border-slate-300 rounded-lg text-sm bg-slate-50 focus:bg-white focus:ring-2 focus:ring-blue-900 focus:border-blue-
